# https://render.com/docs/blueprint-spec
version: "1"
services:
  - type: web
    name: examtracker-ocr-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /openapi.json
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
